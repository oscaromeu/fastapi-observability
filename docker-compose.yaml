x-logging: &default-logging
  driver: fluentd
  options:
    fluentd-address: "localhost:24224"
    fluentd-async: "true"
    tag: "docker.{{.Name}}"

services:
  victoria-logs:
    image: victoriametrics/victoria-logs:v1.50.0@sha256:ae9bea8d8a3b0fc47c7f0058bcca410e79c84b4a0acd12d4dac71b9302526590
    command:
      - -storageDataPath=/vlogs
      - -loggerFormat=json
      - -retentionPeriod=7d
    ports:
      - "9428:9428"
    volumes:
      - victoria-logs-data:/vlogs

  fluentbit:
    image: cr.fluentbit.io/fluent/fluent-bit:5.0.4@sha256:7b4cc81b02155855337f7184e128fc078fd9d6240d99236285233de931b9a929
    command:
      - --config=/fluent-bit/etc/fluent-bit.yaml
    ports:
      - "24224:24224"
    volumes:
      - ./config/fluentbit:/fluent-bit/etc
    depends_on:
      - victoria-logs

  victoria-traces:
    image: victoriametrics/victoria-traces:v0.8.2@sha256:0acb761e60ce86e7b83e5e9f8648421004ea922c5bf1e0755d0346536d747eea
    command:
      - -storageDataPath=/vtraces
      - -loggerFormat=json
    ports:
      - "10428:10428"
    depends_on:
      - fluentbit
    volumes:
      - victoria-traces-data:/vtraces
    logging: *default-logging

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.151.0@sha256:d57bfe8eee2378f31cb1193239fbcac521d54a5a071fca2bfc106916a32b892d
    command:
      - --config=/conf/collector.yaml
    ports:
      - "4317:4317"
      - "8888:8888"
    volumes:
      - ./config/otel:/conf
    depends_on:
      - victoria-traces
    logging: *default-logging

  app-a:
    # build: ./fastapi_app/
    image: ghcr.io/oscaromeu/fastapi-observability/app:0.1.0@sha256:f087c724a0232efae75cda2fb3f1dfb5b2b4b61f0f8d667336855b123af11938
    ports:
      - "8000:8000"
    depends_on:
      - fluentbit
      - otel-collector
    environment:
      APP_NAME: "app-a"
      OTLP_GRPC_ENDPOINT: "http://otel-collector:4317"
    logging: *default-logging

  app-b:
    # build: ./fastapi_app/
    image: ghcr.io/oscaromeu/fastapi-observability/app:0.1.0@sha256:f087c724a0232efae75cda2fb3f1dfb5b2b4b61f0f8d667336855b123af11938
    ports:
      - "8001:8000"
    depends_on:
      - fluentbit
      - otel-collector
    environment:
      APP_NAME: "app-b"
      OTLP_GRPC_ENDPOINT: "http://otel-collector:4317"
    logging: *default-logging

  app-c:
    # build: ./fastapi_app/
    image: ghcr.io/oscaromeu/fastapi-observability/app:0.1.0@sha256:f087c724a0232efae75cda2fb3f1dfb5b2b4b61f0f8d667336855b123af11938
    ports:
      - "8002:8000"
    depends_on:
      - fluentbit
      - otel-collector
    environment:
      APP_NAME: "app-c"
      OTLP_GRPC_ENDPOINT: "http://otel-collector:4317"
    logging: *default-logging

  prometheus:
    image: prom/prometheus:v3.11.3@sha256:e4254400b85610324913f0dc4acf92603d9984e7519414c5a12811aa6146acc3
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus:/workspace
    command:
      - --config.file=/workspace/prometheus.yml
      - --enable-feature=exemplar-storage
    depends_on:
      - fluentbit
    logging: *default-logging

  grafana:
    image: grafana/grafana:13.0.1@sha256:0f86bada30d65ef9d0183b90c1e2682ac92d53d95da8bed322b984ea78a4a73a
    ports:
      - "3000:3000"
    environment:
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource
      # Local-only: skip login. Anonymous Admin lets you edit dashboards without
      # signing in. NEVER use these settings on a Grafana exposed off localhost.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
      GF_AUTH_BASIC_ENABLED: "false"
    volumes:
      - ./config/grafana/:/etc/grafana/provisioning/datasources
      - ./config/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./config/dashboards:/etc/grafana/dashboards
    depends_on:
      - fluentbit
      - prometheus
    logging: *default-logging

volumes:
  victoria-logs-data:
  victoria-traces-data:
