x-logging: &default-logging
  driver: fluentd
  options:
    fluentd-address: "localhost:24224"
    fluentd-async: "true"
    tag: "docker.{{.Name}}"

services:
  victoria-logs:
    image: victoriametrics/victoria-logs:v1.49.0
    command:
      - -storageDataPath=/vlogs
      - -loggerFormat=json
      - -retentionPeriod=7d
    ports:
      - "9428:9428"
    volumes:
      - victoria-logs-data:/vlogs

  fluentbit:
    image: cr.fluentbit.io/fluent/fluent-bit:4.0.2
    command:
      - --config=/fluent-bit/etc/fluent-bit.yaml
    ports:
      - "24224:24224"
    volumes:
      - ./config/fluentbit:/fluent-bit/etc
    depends_on:
      - victoria-logs

  victoria-traces:
    image: victoriametrics/victoria-traces:v0.8.0
    command:
      - -storageDataPath=/vtraces
      - -loggerFormat=json
    ports:
      - "10428:10428"
    depends_on:
      - fluentbit
    volumes:
      - victoria-traces-data:/vtraces
    logging: *default-logging

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.140.1
    command:
      - --config=/conf/collector.yaml
    ports:
      - "4317:4317"
      - "8888:8888"
    volumes:
      - ./config/otel:/conf
    depends_on:
      - victoria-traces
    logging: *default-logging

  app-a:
    # build: ./fastapi_app/
    image: ghcr.io/blueswen/fastapi-observability/app:latest
    ports:
      - "8000:8000"
    depends_on:
      - fluentbit
      - otel-collector
    environment:
      APP_NAME: "app-a"
      OTLP_GRPC_ENDPOINT: "http://otel-collector:4317"
    logging: *default-logging

  app-b:
    # build: ./fastapi_app/
    image: ghcr.io/blueswen/fastapi-observability/app:latest
    ports:
      - "8001:8000"
    depends_on:
      - fluentbit
      - otel-collector
    environment:
      APP_NAME: "app-b"
      OTLP_GRPC_ENDPOINT: "http://otel-collector:4317"
    logging: *default-logging

  app-c:
    # build: ./fastapi_app/
    image: ghcr.io/blueswen/fastapi-observability/app:latest
    ports:
      - "8002:8000"
    depends_on:
      - fluentbit
      - otel-collector
    environment:
      APP_NAME: "app-c"
      OTLP_GRPC_ENDPOINT: "http://otel-collector:4317"
    logging: *default-logging

  prometheus:
    image: prom/prometheus:v2.51.2
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus:/workspace
    command:
      - --config.file=/workspace/prometheus.yml
      - --enable-feature=exemplar-storage
    depends_on:
      - fluentbit
    logging: *default-logging

  grafana:
    image: grafana/grafana:12.4.0
    ports:
      - "3000:3000"
    environment:
      GF_INSTALL_PLUGINS: victoriametrics-logs-datasource
    volumes:
      - ./config/grafana/:/etc/grafana/provisioning/datasources
      - ./config/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml
      - ./config/dashboards:/etc/grafana/dashboards
    depends_on:
      - fluentbit
      - prometheus
    logging: *default-logging

volumes:
  victoria-logs-data:
  victoria-traces-data:
