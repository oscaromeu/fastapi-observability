---
version: '3'

tasks:
  up:
    desc: Start all services (pass `-- --build` to rebuild local images)
    cmd: docker compose up -d {{.CLI_ARGS}}
    dir: "{{.ROOT_DIR}}"

  build:
    desc: Build the local app image
    cmd: docker compose build {{.CLI_ARGS}}
    dir: "{{.ROOT_DIR}}"

  down:
    desc: Stop all services and remove volumes
    cmd: docker compose down -v
    dir: "{{.ROOT_DIR}}"

  restart:
    desc: Restart all services
    cmd: docker compose restart
    dir: "{{.ROOT_DIR}}"

  logs:
    desc: Tail logs from all services
    cmd: docker compose logs -f
    dir: "{{.ROOT_DIR}}"

  ps:
    desc: Show running services
    cmd: docker compose ps
    dir: "{{.ROOT_DIR}}"
